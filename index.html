<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Challenger Focus</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* --- CORE THEME & TYPOGRAPHY --- */
        :root {
            --bg-color: #070913;
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            
            --prism-1: #ffb88c; 
            --prism-2: #ff7eb3; 
            --prism-3: #b28dff; 
            --prism-4: #6ebcf0; 
            
            --glass-bg: rgba(20, 22, 35, 0.35);
            --glass-border-light: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            --liquid-inner-shadow: inset 0 0 0 1px var(--glass-border-light), inset 0 2px 20px rgba(255,255,255,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--text-main); background-color: var(--bg-color); min-height: 100dvh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* --- AUTH & TOP RIGHT NAV --- */
        .top-right-auth { position: absolute; top: 1.5rem; right: 2.5rem; z-index: 10; display: flex; align-items: center; }
        .profile-btn { cursor: pointer; transition: all 0.3s ease; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 2px solid transparent; }
        .profile-btn:hover { transform: scale(1.1); border-color: var(--prism-3); box-shadow: 0 5px 20px rgba(178, 141, 255, 0.5); }
        .profile-btn img { width: 42px; height: 42px; border-radius: 50%; display: block; object-fit: cover; }

        /* --- DEV BADGE --- */
        #dev-badge { display: none; background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; font-size: 0.65rem; font-weight: 800; padding: 2px 8px; border-radius: 4px; margin-left: 10px; vertical-align: middle; letter-spacing: 1px; box-shadow: 0 0 10px rgba(255, 71, 87, 0.4); }

        /* --- BACKGROUND WEAVING LINES --- */
        .bg-lines { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: -1; pointer-events: none; opacity: 1; }
        .wave { fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 250 1500; animation: weaveFlow linear infinite; opacity: 0; will-change: stroke-dashoffset, opacity; }
        .wave1 { animation-duration: 20s; animation-delay: 0s; }
        .wave2 { animation-duration: 25s; animation-delay: -5s; stroke-width: 2.5; }
        .wave3 { animation-duration: 18s; animation-delay: -12s; }
        .wave4 { animation-duration: 22s; animation-delay: -8s; stroke-width: 4; }
        .wave5 { animation-duration: 15s; animation-delay: -2s; }

        @keyframes weaveFlow { 0% { stroke-dashoffset: 1750; opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { stroke-dashoffset: 0; opacity: 0; } }

        /* --- APPLE LIQUID GLASS --- */
        .liquid-glass { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%); box-shadow: var(--glass-shadow), var(--liquid-inner-shadow); border-radius: 24px; position: relative; overflow: hidden; }
        .liquid-glass::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); z-index: 10; }

        /* --- LAYOUT --- */
        .container { width: 90%; max-width: 1000px; margin: 2rem auto; padding: 2.5rem; text-align: center; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2.5rem; margin-top: 1.5rem; margin-bottom: 2rem; width: 90%; max-width: 1000px; border-radius: 100px; }
        h1 { font-weight: 200; letter-spacing: 3px; font-size: 1.5rem; text-transform: uppercase; background: linear-gradient(45deg, var(--prism-1), var(--prism-2), var(--prism-3), var(--prism-4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { display: flex; gap: 2rem; font-size: 0.95rem; font-weight: 300; color: var(--text-muted); margin-left: auto; }
        .stats strong { color: var(--text-main); font-weight: 400; font-size: 1.1rem; margin-left: 0.5rem; }
        .me-icon-container { display: flex; align-items: center; } 
        .me-icon { width: 1.2em; height: 1.2em; vertical-align: text-bottom; margin-left: 4px; }

        /* --- NAVIGATION --- */
        .tabs { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        button.nav-btn { background: transparent; border: none; color: var(--text-muted); font-size: 1rem; font-weight: 300; padding: 0.5rem 1rem; cursor: pointer; transition: 0.3s ease; position: relative; }
        button.nav-btn:hover { color: var(--text-main); }
        button.nav-btn.active { color: var(--text-main); font-weight: 400; }
        button.nav-btn.active::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: var(--prism-3); border-radius: 2px; box-shadow: 0 0 10px var(--prism-3); }

        .summon-fab { position: fixed; bottom: 2rem; right: 2rem; background: linear-gradient(135deg, rgba(255, 126, 179, 0.2), rgba(110, 188, 240, 0.2)); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 50px; padding: 1rem 2rem; font-size: 1rem; font-weight: 300; letter-spacing: 1px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.3s ease; z-index: 50; display: flex; align-items: center; gap: 10px; }
        .summon-fab:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.4); }

        .view { display: none; animation: scaleIn 0.4s ease forwards; opacity: 0; transform: scale(0.98); }
        .view.active { display: block; }
        @keyframes scaleIn { to { opacity: 1; transform: scale(1); } }

        /* --- MODERN PREMIUM BUTTONS --- */
        .modern-btn { position: relative; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main); padding: 1.2rem 3.5rem; border-radius: 50px; font-size: 0.95rem; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); min-width: 220px; }
        .modern-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, var(--prism-1), var(--prism-2), var(--prism-3), var(--prism-4)); z-index: 0; opacity: 0; transition: opacity 0.4s ease; }
        .modern-btn span { position: relative; z-index: 2; transition: all 0.3s ease; }
        .modern-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.3); }
        .modern-btn.primary:hover::before { opacity: 0.15; }
        .modern-btn.primary.active-glow { border-color: var(--prism-2); box-shadow: 0 0 25px rgba(255, 126, 179, 0.4), inset 0 0 15px rgba(255, 126, 179, 0.2); background: rgba(0,0,0,0.2); }
        .modern-btn.primary.active-glow span { color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        .modern-btn.primary.active-glow::before { opacity: 0.2; }
        .modern-btn.secondary { opacity: 0.4; pointer-events: none; border-color: rgba(255,255,255,0.05); }
        .modern-btn.secondary.visible { opacity: 1; pointer-events: auto; border-color: rgba(255,255,255,0.15); }
        .modern-btn.secondary.visible:hover { background: rgba(255,255,255,0.05); border-color: white; }

        /* --- ADVANCED TIMER UI --- */
        .timer-display { font-size: 7.5rem; font-weight: 200; letter-spacing: 5px; margin: 3.5rem 0; font-variant-numeric: tabular-nums; background: linear-gradient(45deg, var(--prism-1), var(--prism-2), var(--prism-3), var(--prism-4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(255, 126, 179, 0.2)); transition: all 0.5s ease; }
        .timer-running { animation: breathe-timer 3s infinite alternate ease-in-out; }
        @keyframes breathe-timer { 0% { filter: drop-shadow(0 0 15px rgba(255, 126, 179, 0.2)); transform: scale(1); } 100% { filter: drop-shadow(0 0 45px rgba(178, 141, 255, 0.7)); transform: scale(1.02); } }
        .timer-controls { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; }

        /* --- COLLECTION UI & ROLE FILTER --- */
        .role-filter { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .role-btn { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 0.6rem 1.2rem; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; font-weight: 300; }
        .role-btn img { width: 18px; height: 18px; filter: grayscale(1) opacity(0.5) invert(1); transition: 0.3s; }
        .role-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .role-btn:hover img { opacity: 0.8; }
        .role-btn.active { background: rgba(178, 141, 255, 0.15); border-color: var(--prism-3); color: var(--text-main); font-weight: 400; box-shadow: 0 0 15px rgba(178, 141, 255, 0.2); }
        .role-btn.active img { filter: grayscale(0) opacity(1) invert(0); drop-shadow: 0 0 5px var(--prism-3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1.5rem; padding: 1rem 0; }
        .champ-card { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 1 / 1.5; display: flex; align-items: flex-end; justify-content: center; background: rgba(0, 0, 0, 0.5); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s ease; will-change: transform; cursor: pointer; }
        .champ-card:hover { transform: translateY(-5px); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), 0 10px 25px rgba(0,0,0,0.6); z-index: 2; }
        .champ-card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.3s ease; }
        .champ-card.locked img { filter: brightness(0.25) grayscale(0.9); opacity: 0.8; }
        .champ-card .name-tag { position: relative; z-index: 2; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); width: 100%; padding: 2rem 0.5rem 0.8rem; text-align: center; font-size: 0.8rem; letter-spacing: 1px; font-weight: 400; }
        .champ-card.locked .name-tag { color: var(--text-muted); }
        .locked-status { display: block; font-size: 0.6rem; color: var(--prism-2); margin-top: 3px; letter-spacing: 2px; font-weight: 600; }

        /* --- BTS "LOVE YOURSELF" SUMMON PORTAL --- */
        #summon-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #000; z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .summon-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #101428 0%, #000 70%); z-index: -1; overflow: hidden; }
        .close-summon { position: absolute; top: 2rem; right: 2rem; font-size: 1rem; color: var(--text-muted); cursor: pointer; background: none; border: none; letter-spacing: 1px; z-index: 10; }
        
        .ly-bloom-container { position: relative; width: 280px; height: 280px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .ly-ring { position: absolute; width: 100%; height: 100%; border-radius: 40% 60% 60% 40% / 50% 50% 40% 60%; background: linear-gradient(45deg, var(--prism-1), var(--prism-2), var(--prism-3), var(--prism-4)); opacity: 0.4; animation: lySpin 8s linear infinite; filter: blur(4px); mix-blend-mode: screen; transition: all 0.5s ease; }
        .ly-ring:nth-child(2) { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; animation-direction: reverse; animation-duration: 12s; opacity: 0.5; background: linear-gradient(135deg, var(--prism-2), var(--prism-4)); }
        .ly-ring:nth-child(3) { border-radius: 50% 50% 60% 40% / 40% 60% 50% 50%; animation-duration: 10s; background: linear-gradient(225deg, var(--prism-3), var(--prism-1)); opacity: 0.4; }
        .ly-center { position: absolute; width: 60px; height: 60px; background: #fff; border-radius: 50%; box-shadow: 0 0 40px #fff, 0 0 80px var(--prism-2); z-index: 10; display: flex; justify-content: center; align-items: center; color: var(--bg-color); transition: all 0.5s ease; }
        
        .ly-bloom-container:hover .ly-center { transform: scale(1.3); box-shadow: 0 0 60px #fff, 0 0 120px var(--prism-3); }
        .ly-bloom-container:hover .ly-ring { filter: blur(6px) brightness(1.2); opacity: 0.7; }
        
        @keyframes lySpin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.05); } 100% { transform: rotate(360deg) scale(1); } }

        /* --- CINEMATIC REVEAL --- */
        #reveal-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 500; display: none; opacity: 0; transition: opacity 1.5s ease; overflow: hidden; background: #000; }
        .reveal-splash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); transform: scale(1.1); animation: zoomOut 8s ease forwards; }
        @keyframes zoomOut { to { transform: scale(1); } }
        .reveal-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 5rem; align-items: flex-start; }
        .reveal-rarity { font-size: 1rem; letter-spacing: 5px; text-transform: uppercase; color: var(--prism-3); margin-bottom: 1rem; opacity: 0; transform: translateY(20px); }
        .reveal-name { font-size: 5rem; font-weight: 200; letter-spacing: 10px; text-transform: uppercase; margin-bottom: 2rem; opacity: 0; transform: translateY(20px); }
        .reveal-active .reveal-rarity { animation: fadeUp 1s 0.5s ease forwards; }
        .reveal-active .reveal-name { animation: fadeUp 1s 0.7s ease forwards; }
        .reveal-active .reveal-btn { animation: fadeUp 1s 1s ease forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* --- CODEX LORE MODAL --- */
        #codex-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 400; }
        .codex-container { width: 98%; max-width: 1400px; height: 85dvh; display: flex; flex-direction: row; border-radius: 24px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); overflow: hidden; position: relative; }
        .close-codex { position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; z-index: 20; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .carousel-section { flex: 2.5; background: #000; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .carousel-img { width: 100%; height: 100%; object-fit: cover; object-position: top center; opacity: 0; transition: opacity 0.5s ease; }
        .carousel-controls { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0.5) 60%, transparent); padding: 3rem 2.5rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .carousel-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; backdrop-filter: blur(10px); transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .skin-name { font-weight: 300; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; text-align: center; flex: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .lore-section { flex: 1; padding: 2.5rem; overflow-y: auto; background: linear-gradient(135deg, rgba(20,22,35,0.9), rgba(10,12,20,0.98)); display: flex; flex-direction: column; }
        .lore-title { font-size: 2.2rem; font-weight: 200; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 0.5rem; background: linear-gradient(45deg, var(--prism-1), var(--prism-2), var(--prism-3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .lore-subtitle { font-size: 1rem; color: var(--prism-4); font-weight: 400; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 1.5rem; }
        .lore-text { font-size: 0.95rem; line-height: 1.7; color: var(--text-muted); font-weight: 300; }
        .loading-spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: 300; letter-spacing: 3px; font-size: 1.2rem; display: none; }
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #fff; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.6s; }

        /* --- MOBILE RESPONSIVENESS (IPHONE & PORTRAIT) --- */
        @media (max-width: 768px) {
            /* Header & Auth Reflow */
            .top-right-auth { position: static; justify-content: center; margin-top: 1.5rem; width: 100%; padding: 0; }
            header { flex-direction: column; text-align: center; gap: 1rem; padding: 1.5rem 1rem; border-radius: 20px; width: 92%; }
            .stats { margin: 0; justify-content: center; width: 100%; flex-wrap: wrap; gap: 1rem; }
            h1 { font-size: 1.3rem; }

            /* Container Spacing */
            .container { padding: 1.5rem 1rem; width: 92%; margin-top: 1rem; }

            /* Timer Scaling */
            .timer-display { font-size: 4rem; margin: 2rem 0; letter-spacing: 2px; }
            .timer-controls { flex-direction: column; gap: 1rem; }
            .modern-btn { width: 100%; min-width: auto; padding: 1.2rem; }
            
            /* Collection UI Adjustments */
            .role-filter { gap: 0.5rem; }
            .role-btn { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }

            /* Bottom Summon Button */
            .summon-fab { width: 90%; right: 50%; bottom: 1.5rem; transform: translateX(50%); justify-content: center; padding: 1.2rem; font-size: 1.1rem; }
            .summon-fab:hover { transform: translate(50%, -5px); }
            .container { margin-bottom: 6rem; } /* Make room for floating button */

            /* Cinematic Reveal Screens */
            .reveal-overlay { padding: 3rem 1.5rem; align-items: center; text-align: center; }
            .reveal-name { font-size: 2.5rem; letter-spacing: 4px; margin-bottom: 1.5rem; }
            .reveal-rarity { font-size: 0.9rem; }
            
            /* Codex Adjustments */
            .codex-container { flex-direction: column; height: 90dvh; border-radius: 16px; margin-top: env(safe-area-inset-top); }
            .carousel-section { flex: 1.2; min-height: 35dvh; }
            .lore-section { flex: 1; padding: 1.5rem; }
            .lore-title { font-size: 1.6rem; }
            .carousel-controls { padding: 1.5rem 1rem 1rem; }
            .carousel-btn { width: 40px; height: 40px; font-size: 1.2rem; }
            .skin-name { font-size: 1rem; }
            .close-codex { top: 1rem; right: 1rem; width: 35px; height: 35px; }
            .close-summon { top: env(safe-area-inset-top, 2rem); }
        }
    </style>
</head>
<body>

    <svg class="bg-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
            <linearGradient id="prism" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffb88c" /><stop offset="33%" stop-color="#ff7eb3" /><stop offset="66%" stop-color="#b28dff" /><stop offset="100%" stop-color="#6ebcf0" />
            </linearGradient>
            <linearGradient id="prism-rev" x1="100%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" stop-color="#ffb88c" /><stop offset="33%" stop-color="#ff7eb3" /><stop offset="66%" stop-color="#b28dff" /><stop offset="100%" stop-color="#6ebcf0" />
            </linearGradient>
        </defs>
        <path class="wave wave1" d="M -10,10 C 30,50 60,10 110,60" stroke="url(#prism)" />
        <path class="wave wave2" d="M -10,80 C 40,90 50,20 110,30" stroke="url(#prism-rev)" />
        <path class="wave wave3" d="M 110,80 C 80,100 20,40 -10,60" stroke="url(#prism)" />
        <path class="wave wave4" d="M 30,-10 C 60,40 20,70 60,110" stroke="url(#prism-rev)" />
        <path class="wave wave5" d="M 80,-10 C 100,50 40,60 20,110" stroke="url(#prism)" />
    </svg>

    <div class="top-right-auth">
        <button id="login-btn" class="modern-btn" style="min-width: 120px; padding: 0.6rem 1.2rem; font-size: 0.75rem;" onclick="login()"><span>Sync Google</span></button>
        <div id="user-pill" class="profile-btn" style="display: none;" onclick="logout()" title="Log Out">
            <img id="user-photo" src="" alt="Profile">
        </div>
    </div>

    <header class="liquid-glass">
        <h1>Challenger Focus <span id="dev-badge">DEV</span></h1>
        
        <div class="stats">
            <div>Focus: <strong id="total-time-ui">0.00</strong> hrs</div>
            <div class="me-icon-container">
                Mythic Essence: <strong id="gem-count-ui">0</strong> 
                <img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/currency/tokens/mythic_essence.png" class="me-icon" alt="ME">
            </div>
        </div>
    </header>

    <div class="tabs">
        <button class="nav-btn active" onclick="switchTab(this, 'timer')">Focus Session</button>
        <button class="nav-btn" onclick="switchTab(this, 'collection')">Champion Codex</button>
    </div>

    <div class="container liquid-glass" style="min-height: 500px;">
        <div id="timer-view" class="view active">
            <div class="timer-display" id="timer-display">00:00:00</div>
            <div class="timer-controls">
                <button id="toggle-btn" class="modern-btn primary" onclick="toggleTimer()"><span id="toggle-text">Initiate</span></button>
                <button id="save-btn" class="modern-btn secondary" onclick="saveTimer()"><span>Conclude & Save</span></button>
            </div>
            <p id="cost-info" style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted); font-weight: 300;">
                1 Mythic Essence <img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/currency/tokens/mythic_essence.png" class="me-icon" alt="ME" onclick="tryDevMode()" style="cursor: pointer;" title="Admin Override"> awarded per 15 minutes.
            </p>
        </div>
        
        <div id="collection-view" class="view">
            <div class="role-filter">
                <button class="role-btn active" onclick="filterRole('All', this)">All Roles</button>
                <button class="role-btn" onclick="filterRole('Top', this)">
                    <img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-clash/global/default/assets/images/position-selector/positions/icon-position-top.png" alt="Top"> Top
                </button>
                <button class="role-btn" onclick="filterRole('Jungle', this)">
                    <img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-clash/global/default/assets/images/position-selector/positions/icon-position-jungle.png" alt="Jungle"> Jungle
                </button>
                <button class="role-btn" onclick="filterRole('Mid', this)">
                    <img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-clash/global/default/assets/images/position-selector/positions/icon-position-middle.png" alt="Mid"> Mid
                </button>
                <button class="role-btn" onclick="filterRole('ADC', this)">
                    <img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-clash/global/default/assets/images/position-selector/positions/icon-position-bottom.png" alt="ADC"> ADC
                </button>
                <button class="role-btn" onclick="filterRole('Support', this)">
                    <img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-clash/global/default/assets/images/position-selector/positions/icon-position-utility.png" alt="Support"> Support
                </button>
            </div>
            <div class="grid" id="collection-grid"></div>
        </div>
    </div>

    <button class="summon-fab" onclick="openSummonScreen()"><span>✦</span> Enter Summon Portal</button>

    <div id="summon-screen">
        <div class="summon-bg" id="summon-canvas"></div>
        <button class="close-summon" onclick="closeSummonScreen()">✕ CLOSE</button>
        
        <div class="ly-bloom-container" id="main-orb" onclick="executeSummon()">
            <div class="ly-ring"></div>
            <div class="ly-ring"></div>
            <div class="ly-ring"></div>
            <div class="ly-center">✦</div>
        </div>

        <div class="summon-text" style="margin-top: 4rem; letter-spacing: 5px; font-weight: 200;">TOUCH TO MANIFEST</div>
    </div>

    <div id="reveal-screen">
        <img id="reveal-img" class="reveal-splash" src="" alt="">
        <div class="reveal-overlay">
            <div id="reveal-rarity" class="reveal-rarity">Legendary</div>
            <div id="reveal-name" class="reveal-name">Jinx</div>
            <button class="modern-btn primary reveal-btn" style="opacity: 0;" onclick="closeReveal()"><span>Accept</span></button>
        </div>
    </div>

    <div id="flash-overlay"></div>

    <div id="codex-modal">
        <div class="codex-container">
            <button class="close-codex" onclick="closeCodexModal()">✕</button>
            <div class="carousel-section">
                <div class="loading-spinner" id="carousel-loading">Connecting...</div>
                <img id="carousel-img" class="carousel-img" src="" alt="" onload="this.style.opacity=1">
                <div class="carousel-controls">
                    <button class="carousel-btn" onclick="prevSkin()">&#10094;</button>
                    <div class="skin-name" id="carousel-skin-name">Default</div>
                    <button class="carousel-btn" onclick="nextSkin()">&#10095;</button>
                </div>
            </div>
            <div class="lore-section">
                <h1 class="lore-title" id="lore-name">Loading...</h1>
                <h3 class="lore-subtitle" id="lore-title"></h3>
                <div class="lore-text" id="lore-body"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAfLuaBub2hnDz3o4bpy6g7jJWGJhUC_X4",
            authDomain: "challenger-focus-89bae.firebaseapp.com",
            projectId: "challenger-focus-89bae",
            storageBucket: "challenger-focus-89bae.firebasestorage.app",
            messagingSenderId: "110057760971",
            appId: "1:110057760971:web:114419fb2a579ae974134e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();
        
        let currentUser = null;

        function login() { auth.signInWithPopup(provider).catch(err => alert("Login Failed: " + err.message)); }
        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-pill').style.display = 'block';
                document.getElementById('user-photo').src = user.photoURL;
                
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    gems = data.gems !== undefined ? data.gems : gems;
                    totalStudySeconds = data.totalStudySeconds !== undefined ? data.totalStudySeconds : totalStudySeconds;
                    unconvertedSeconds = data.unconvertedSeconds !== undefined ? data.unconvertedSeconds : unconvertedSeconds;
                    unlockedChamps = data.unlockedChamps || unlockedChamps;
                }
            }
            updateHeaderStats();
            renderCollection();
        });

        async function syncData() {
            if (isDevMode) {
                console.log("Dev Mode Active: Cloud saving disabled.");
                return; 
            }
            if (currentUser) {
                await db.collection('users').doc(currentUser.uid).set({
                    gems: gems,
                    totalStudySeconds: totalStudySeconds,
                    unconvertedSeconds: unconvertedSeconds,
                    unlockedChamps: unlockedChamps
                }, { merge: true });
            } else {
                localStorage.setItem('gems', gems);
                localStorage.setItem('totalStudySeconds', totalStudySeconds);
                localStorage.setItem('unconvertedSeconds', unconvertedSeconds);
                localStorage.setItem('unlockedChamps', JSON.stringify(unlockedChamps));
            }
        }

        // --- 3. DATA AND HELPERS ---
        const championData = {
            'Top': { rarity: 'Common', champs: ['Zaahen', 'Aatrox', 'Ambessa', 'Camille', 'Chogath', 'Darius', 'DrMundo', 'Fiora', 'Gangplank', 'Garen', 'Gnar', 'Gwen', 'Illaoi', 'Irelia', 'Jax', 'Jayce', 'KSante', 'Kayle', 'Kennen', 'Kled', 'Malphite', 'Maokai', 'Mordekaiser', 'Nasus', 'Olaf', 'Ornn', 'Pantheon', 'Poppy', 'Quinn', 'Renekton', 'Riven', 'Rumble', 'Sett', 'Shen', 'Singed', 'Sion', 'TahmKench', 'Teemo', 'Trundle', 'Tryndamere', 'Urgot', 'Volibear', 'Yorick']},
            'Support': { rarity: 'Rare', champs: ['Alistar', 'Bard', 'Blitzcrank', 'Braum', 'Janna', 'Karma', 'Leona', 'Lulu', 'Mel', 'Milio', 'Morgana', 'Nami', 'Nautilus', 'Pyke', 'Rakan', 'Rell', 'Renata', 'Senna', 'Seraphine', 'Sona', 'Soraka', 'Taric', 'Thresh', 'Yuumi', 'Zilean', 'Zyra']},
            'Jungle': { rarity: 'Epic', champs: ['Amumu', 'Belveth', 'Briar', 'Diana', 'Ekko', 'Elise', 'Evelynn', 'Fiddlesticks', 'Gragas', 'Graves', 'Hecarim', 'Ivern', 'JarvanIV', 'Karthus', 'Kayn', 'Khazix', 'Kindred', 'LeeSin', 'Lillia', 'MasterYi', 'MonkeyKing', 'Nidalee', 'Nocturne', 'Nunu', 'Rammus', 'RekSai', 'Rengar', 'Sejuani', 'Shaco', 'Shyvana', 'Skarner', 'Talon', 'Udyr', 'Vi', 'Viego', 'Warwick', 'XinZhao', 'Zac']},
            'Mid': { rarity: 'Mythic', champs: ['Ahri', 'Akali', 'Akshan', 'Anivia', 'Annie', 'AurelionSol', 'Aurora', 'Azir', 'Brand', 'Cassiopeia', 'Corki', 'Fizz', 'Galio', 'Heimerdinger', 'Hwei', 'Kassadin', 'Katarina', 'Leblanc', 'Lissandra', 'Lux', 'Malzahar', 'Naafiri', 'Neeko', 'Orianna', 'Qiyana', 'Ryze', 'Swain', 'Sylas', 'Syndra', 'Taliyah', 'TwistedFate', 'Veigar', 'Velkoz', 'Vex', 'Viktor', 'Vladimir', 'Xerath', 'Yasuo', 'Yone', 'Zed', 'Ziggs', 'Zoe']},
            'ADC': { rarity: 'Legendary', champs: ['Aphelios', 'Ashe', 'Caitlyn', 'Draven', 'Ezreal', 'Jhin', 'Jinx', 'Kaisa', 'Kalista', 'KogMaw', 'Lucian', 'MissFortune', 'Nilah', 'Samira', 'Sivir', 'Smolder', 'Tristana', 'Twitch', 'Varus', 'Vayne', 'Xayah', 'Yunara', 'Zeri']}
        };

        function formatChampName(id) {
            const specials = {
                'AurelionSol': 'Aurelion Sol', 'Chogath': "Cho'Gath", 'DrMundo': 'Dr. Mundo', 
                'JarvanIV': 'Jarvan IV', 'Kaisa': "Kai'Sa", 'Khazix': "Kha'Zix", 'KogMaw': "Kog'Maw",
                'LeeSin': 'Lee Sin', 'MasterYi': 'Master Yi', 'MissFortune': 'Miss Fortune', 
                'MonkeyKing': 'Wukong', 'RekSai': "Rek'Sai", 'Renata': 'Renata Glasc',
                'TahmKench': 'Tahm Kench', 'TwistedFate': 'Twisted Fate', 'XinZhao': 'Xin Zhao', 
                'Velkoz': "Vel'Koz", 'Belveth': "Bel'Veth", 'KSante': "K'Sante", 
                'Leblanc': 'LeBlanc', 'Nunu': 'Nunu & Willump'
            };
            if (specials[id]) return specials[id];
            return id.replace(/([A-Z])/g, ' $1').trim();
        }

        function getApiName(id) {
            if(id === 'Wukong') return 'MonkeyKing';
            if(id === 'Renata Glasc') return 'Renata';
            if(id === 'Belveth') return 'Belveth'; 
            return id;
        }

        let isDevMode = false;
        let isSummoning = false; 
        let gems = parseInt(localStorage.getItem('gems')) || 0;
        let totalStudySeconds = parseInt(localStorage.getItem('totalStudySeconds')) || 0;
        let unconvertedSeconds = parseInt(localStorage.getItem('unconvertedSeconds')) || 0;
        let unlockedChamps = JSON.parse(localStorage.getItem('unlockedChamps')) || [];
        let currentRoleFilter = 'All'; 
        
        let isRunning = false, timerInterval = null, currentSessionSeconds = 0;
        
        let sessionStartTime = 0;
        let sessionAccumulated = 0;
        
        let currentSkins = [];
        let currentSkinIndex = 0;
        let ddragonVersion = '14.4.1';

        fetch('https://ddragon.leagueoflegends.com/api/versions.json').then(res => res.json()).then(data => { ddragonVersion = data[0]; });
        
        function updateHeaderStats() {
            document.getElementById('total-time-ui').innerText = (totalStudySeconds / 3600).toFixed(2);
            document.getElementById('gem-count-ui').innerText = isDevMode ? '∞' : gems;
        }

        function tryDevMode() {
            if (!isDevMode) {
                const pass = prompt("Enter System Override Code:");
                if (pass === "Naomi") {
                    isDevMode = true;
                    document.getElementById('dev-badge').style.display = 'inline-block';
                    document.getElementById('cost-info').style.color = '#ff4757';
                    document.getElementById('cost-info').innerHTML = 'DEVELOPER OVERRIDE: Sandbox Mode. Saves are disabled. <img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/currency/tokens/mythic_essence.png" class="me-icon" alt="ME" onclick="tryDevMode()" style="cursor: pointer;" title="Exit Admin Override">';
                    updateHeaderStats();
                }
            } else {
                const pass = prompt("Enter System Override Code to Exit:");
                if (pass === "Naomi") {
                    isDevMode = false;
                    document.getElementById('dev-badge').style.display = 'none';
                    document.getElementById('cost-info').style.color = 'var(--text-muted)';
                    document.getElementById('cost-info').innerHTML = '1 Mythic Essence <img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/currency/tokens/mythic_essence.png" class="me-icon" alt="ME" onclick="tryDevMode()" style="cursor: pointer;" title="Admin Override"> awarded per 15 minutes.';
                    updateHeaderStats();
                }
            }
        }

        function toggleTimer() {
            if (isRunning) { 
                clearInterval(timerInterval); 
                sessionAccumulated = currentSessionSeconds; 
                document.getElementById('toggle-text').innerText = "RESUME"; 
            } 
            else { 
                sessionStartTime = Date.now(); 
                timerInterval = setInterval(() => { 
                    const elapsedSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
                    currentSessionSeconds = sessionAccumulated + elapsedSeconds; 
                    updateTimerDisplay(); 
                }, 1000); 
                document.getElementById('toggle-text').innerText = "PAUSE"; 
                document.getElementById('save-btn').classList.add('visible');
            }
            isRunning = !isRunning;
        }

        function saveTimer() {
            totalStudySeconds += currentSessionSeconds; unconvertedSeconds += currentSessionSeconds;
            let newGems = Math.floor(unconvertedSeconds / 900);
            if (newGems > 0) { gems += newGems; unconvertedSeconds %= 900; }
            
            clearInterval(timerInterval); 
            isRunning = false; 
            currentSessionSeconds = 0;
            sessionAccumulated = 0; 
            
            document.getElementById('toggle-text').innerText = "INITIATE";
            document.getElementById('save-btn').classList.remove('visible');
            
            updateTimerDisplay(); 
            updateHeaderStats();
            syncData(); 
        }

        function updateTimerDisplay() {
            const h = Math.floor(currentSessionSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((currentSessionSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (currentSessionSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
        }

        function openSummonScreen() {
            const s = document.getElementById('summon-screen');
            s.style.display = 'flex'; setTimeout(() => s.style.opacity = '1', 10);
        }

        function closeSummonScreen() {
            const s = document.getElementById('summon-screen');
            s.style.opacity = '0'; setTimeout(() => s.style.display = 'none', 1000);
        }

        function executeSummon() {
            if (isSummoning) return;
            
            let allOwned = true;
            for(const r in championData) {
                if (championData[r].champs.some(c => !unlockedChamps.includes(c))) {
                    allOwned = false;
                    break;
                }
            }
            if (allOwned) {
                alert("You have already manifested all entities!");
                return;
            }

            if (!isDevMode && gems < 1) { alert("Insufficient Mythic Essence."); return; }
            
            isSummoning = true; 

            if (!isDevMode) {
                gems--; updateHeaderStats();
            }

            const orb = document.getElementById('main-orb');
            orb.style.transform = 'scale(2.5)';
            orb.style.filter = 'brightness(5) hue-rotate(90deg)';

            setTimeout(() => {
                const flash = document.getElementById('flash-overlay');
                flash.style.opacity = '1';
                
                setTimeout(() => {
                    const roll = Math.random();
                    let targetRole = roll < 0.4 ? 'Top' : roll < 0.7 ? 'Support' : roll < 0.9 ? 'Jungle' : roll < 0.98 ? 'Mid' : 'ADC';
                    
                    let availableInTargetRole = championData[targetRole].champs.filter(c => !unlockedChamps.includes(c));
                    let champPulled, rolePulled, rarityPulled;

                    if (availableInTargetRole.length === 0) {
                        const allAvailable = [];
                        for(const r in championData) {
                           championData[r].champs.forEach(c => {
                               if(!unlockedChamps.includes(c)) {
                                   allAvailable.push({ c: c, r: r, rarity: championData[r].rarity });
                               }
                           });
                        }
                        const randomPick = allAvailable[Math.floor(Math.random() * allAvailable.length)];
                        champPulled = randomPick.c;
                        rolePulled = randomPick.r;
                        rarityPulled = randomPick.rarity;
                    } else {
                        champPulled = availableInTargetRole[Math.floor(Math.random() * availableInTargetRole.length)];
                        rolePulled = targetRole;
                        rarityPulled = championData[targetRole].rarity;
                    }

                    unlockedChamps.push(champPulled);
                    renderCollection();
                    syncData(); 

                    showReveal(champPulled, rolePulled, rarityPulled);
                    
                    orb.style.transform = ''; orb.style.filter = '';
                    flash.style.opacity = '0';
                    closeSummonScreen();
                    
                    isSummoning = false; 
                }, 600);
            }, 1000);
        }

        function showReveal(id, role, rarity) {
            const screen = document.getElementById('reveal-screen');
            const img = document.getElementById('reveal-img');
            img.src = `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${id}_0.jpg`;
            document.getElementById('reveal-name').innerText = formatChampName(id);
            document.getElementById('reveal-rarity').innerText = `${rarity} // ${role}`;
            
            screen.style.display = 'block';
            setTimeout(() => { screen.style.opacity = '1'; screen.classList.add('reveal-active'); }, 50);
        }

        function closeReveal() {
            const screen = document.getElementById('reveal-screen');
            screen.style.opacity = '0';
            setTimeout(() => { screen.style.display = 'none'; screen.classList.remove('reveal-active'); }, 1500);
        }

        function filterRole(role, btnElement) {
            currentRoleFilter = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            renderCollection();
        }

        function renderCollection() {
            const grid = document.getElementById('collection-grid'); grid.innerHTML = '';
            const all = []; 
            
            Object.keys(championData).forEach(r => {
                if (currentRoleFilter === 'All' || currentRoleFilter === r) {
                    championData[r].champs.forEach(c => all.push({id: c, role: r, rarity: championData[r].rarity}));
                }
            });
            
            all.sort((a,b) => a.id.localeCompare(b.id)).forEach(c => {
                const unlocked = unlockedChamps.includes(c.id);
                const card = document.createElement('div');
                card.className = `champ-card ${unlocked ? '' : 'locked'}`;
                
                card.onclick = () => openCodex(c.id);

                card.innerHTML = `<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${c.id}_0.jpg" onerror="this.src='https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/champion-icons/-1.png'"><div class="name-tag">${formatChampName(c.id)}${unlocked ? '' : '<span class="locked-status">LOCKED</span>'}</div>`;
                grid.appendChild(card);
            });
        }

        async function openCodex(id) {
            const m = document.getElementById('codex-modal'); m.style.display = 'flex';
            const imgEl = document.getElementById('carousel-img');
            const spinner = document.getElementById('carousel-loading');
            
            imgEl.style.opacity = 0;
            spinner.style.display = 'block';
            document.getElementById('carousel-skin-name').innerText = "Loading Skins...";
            document.getElementById('lore-name').innerText = "Loading...";
            document.getElementById('lore-title').innerText = "";
            document.getElementById('lore-body').innerText = "";

            const apiName = getApiName(id);

            try {
                const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/data/en_US/champion/${apiName}.json`);
                if(!res.ok) throw new Error("Champion not found in API");
                
                const data = await res.json();
                const champData = data.data[apiName];

                document.getElementById('lore-name').innerText = champData.name;
                document.getElementById('lore-title').innerText = champData.title;
                document.getElementById('lore-body').innerText = champData.lore;

                currentSkins = champData.skins
                    .filter(skin => !skin.name.includes('(') && !skin.name.includes(')'))
                    .map(skin => ({
                        name: skin.name === 'default' ? champData.name : skin.name,
                        url: `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${apiName}_${skin.num}.jpg`
                    }));
                currentSkinIndex = 0;
                updateCarouselUI();

            } catch (err) {
                document.getElementById('lore-name').innerText = formatChampName(id);
                document.getElementById('lore-title').innerText = "The New Challenger";
                document.getElementById('lore-body').innerText = "Data regarding this champion is currently classified or unavailable in standard databanks. They have yet to fully reveal their origins to the realm.";
                
                currentSkins = [{
                    name: formatChampName(id),
                    url: `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${id}_0.jpg`
                }];
                currentSkinIndex = 0;
                updateCarouselUI();
            }
        }

        function updateCarouselUI() {
            const imgEl = document.getElementById('carousel-img');
            const spinner = document.getElementById('carousel-loading');
            const nameEl = document.getElementById('carousel-skin-name');

            if(currentSkins.length === 0) return;

            imgEl.style.opacity = 0;
            setTimeout(() => {
                imgEl.src = currentSkins[currentSkinIndex].url;
                imgEl.onerror = function() { this.src = 'https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/champion-icons/-1.png'; };
                nameEl.innerText = currentSkins[currentSkinIndex].name;
                spinner.style.display = 'none';
            }, 200);
        }

        function nextSkin() {
            if(currentSkins.length <= 1) return;
            currentSkinIndex = (currentSkinIndex + 1) % currentSkins.length;
            updateCarouselUI();
        }

        function prevSkin() {
            if(currentSkins.length <= 1) return;
            currentSkinIndex = (currentSkinIndex - 1 + currentSkins.length) % currentSkins.length;
            updateCarouselUI();
        }

        function closeCodexModal() { document.getElementById('codex-modal').style.display = 'none'; }
        
        function switchTab(btn, id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id + '-view').classList.add('active'); btn.classList.add('active');
        }

        updateHeaderStats(); renderCollection();
    </script>
</body>
</html>
